<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor de Descargas - Torrent</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .form-section {
            background: white;
            border-radius: 10px;
            padding: 25px;
            margin-bottom: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 5px;
            font-size: 1em;
            transition: border-color 0.3s;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 5px rgba(102, 126, 234, 0.3);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }

        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 5px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-danger {
            background: #ff6b6b;
            color: white;
            padding: 8px 15px;
            font-size: 0.9em;
        }

        .btn-danger:hover {
            background: #ee5a52;
        }

        .btn-pause {
            background: #ffa500;
            color: white;
            padding: 8px 15px;
            font-size: 0.9em;
        }

        .btn-pause:hover {
            background: #ff9500;
        }

        .btn-resume {
            background: #51cf66;
            color: white;
            padding: 8px 15px;
            font-size: 0.9em;
        }

        .btn-resume:hover {
            background: #40c057;
        }

        .downloads-section {
            background: white;
            border-radius: 10px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .downloads-section h2 {
            margin-bottom: 20px;
            color: #333;
        }

        .download-item {
            background: #f8f9fa;
            border-left: 4px solid #667eea;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 5px;
            transition: all 0.3s;
        }

        .download-item:hover {
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .download-item-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 10px;
        }

        .download-item-title {
            font-size: 1.1em;
            font-weight: 600;
            color: #333;
        }

        .status-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 600;
        }

        .status-descargando {
            background: #d3f9ff;
            color: #0c7792;
        }

        .status-completado {
            background: #d3f8d3;
            color: #2d5016;
        }

        .status-pausado {
            background: #fff3bf;
            color: #7d6608;
        }

        .status-error {
            background: #ffdedb;
            color: #7d2818;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #e0e0e0;
            border-radius: 4px;
            margin-bottom: 10px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            width: 0%;
            transition: width 0.3s;
        }

        .download-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 10px;
            margin-bottom: 10px;
            font-size: 0.85em;
        }

        .stat {
            color: #666;
        }

        .stat-label {
            font-weight: 600;
            color: #333;
        }

        .download-actions {
            display: flex;
            gap: 8px;
            margin-top: 10px;
            flex-wrap: wrap;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        .error-message {
            background: #ffdedb;
            color: #7d2818;
            padding: 12px;
            border-radius: 5px;
            margin-bottom: 15px;
            display: none;
        }

        .success-message {
            background: #d3f8d3;
            color: #2d5016;
            padding: 12px;
            border-radius: 5px;
            margin-bottom: 15px;
            display: none;
        }

        @media (max-width: 768px) {
            .download-item-header {
                flex-direction: column;
                gap: 10px;
            }

            .download-stats {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📥 Gestor de Descargas Torrent</h1>
            <p>Sistema de descarga de películas en tiempo real</p>
        </div>

        <div class="form-section">
            <h2>Iniciar Nueva Descarga</h2>
            <div id="errorMessage" class="error-message"></div>
            <div id="successMessage" class="success-message"></div>
            
            <form id="downloadForm">
                <div class="form-group">
                    <label for="magnetLink">Enlace Magnético (Magnet Link)</label>
                    <input 
                        type="text" 
                        id="magnetLink" 
                        placeholder="magnet:?xt=urn:btih:..." 
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="title">Nombre de la Película</label>
                    <input 
                        type="text" 
                        id="title" 
                        placeholder="Ej: Avatar 2" 
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="description">Descripción (Opcional)</label>
                    <textarea 
                        id="description" 
                        placeholder="Describe la película..."
                    ></textarea>
                </div>

                <button type="submit" class="btn btn-primary">Iniciar Descarga</button>
            </form>
        </div>

        <div class="downloads-section">
            <h2>Mis Descargas</h2>
            <div id="downloadsList"></div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8000';
        const AUTH_KEYS = {
            token: 'movieplus:token',
            userId: 'movieplus:userId',
            username: 'movieplus:username',
            legacyToken: 'auth_token'
        };

        function getAuthToken() {
            const primary = localStorage.getItem(AUTH_KEYS.token);
            if (primary) return primary;

            // Fallback para instalaciones anteriores.
            return localStorage.getItem(AUTH_KEYS.legacyToken);
        }

        function clearAuthSession() {
            localStorage.removeItem(AUTH_KEYS.token);
            localStorage.removeItem(AUTH_KEYS.userId);
            localStorage.removeItem(AUTH_KEYS.username);
            localStorage.removeItem(AUTH_KEYS.legacyToken);
        }

        let authToken = getAuthToken();

        // Si no hay token, redirigir a login
        if (!authToken) {
            alert('Debes autenticarte primero');
            window.location.href = 'login.html';
        }

        const downloadForm = document.getElementById('downloadForm');
        const downloadsList = document.getElementById('downloadsList');
        const errorMessage = document.getElementById('errorMessage');
        const successMessage = document.getElementById('successMessage');

        // Cargar descargas al abrir la página
        loadDownloads();

        // Recargar descargas cada 3 segundos
        setInterval(loadDownloads, 3000);

        downloadForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const magnetLink = document.getElementById('magnetLink').value;
            const title = document.getElementById('title').value;
            const description = document.getElementById('description').value;

            if (!magnetLink.startsWith('magnet:')) {
                showError('El enlace magnético debe comenzar con "magnet:"');
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/torrents/iniciar`, {
                    method: 'POST',
                    headers: {
                        'x-auth-token': authToken,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ magnet_link: magnetLink, title, description })
                });

                const data = await response.json();

                if (!response.ok) {
                    showError(data.error || 'Error al iniciar descarga');
                    return;
                }

                showSuccess(`Descarga iniciada: ${title}`);
                downloadForm.reset();
                loadDownloads();
            } catch (error) {
                showError('Error de conexión: ' + error.message);
            }
        });

        async function loadDownloads() {
            try {
                const response = await fetch(`${API_BASE}/torrents/descargas`, {
                    headers: { 'x-auth-token': authToken }
                });

                const data = await response.json();

                if (response.status === 401) {
                    clearAuthSession();
                    showError('Tu sesión expiró. Inicia sesión nuevamente.');
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 1200);
                    return;
                }

                if (!response.ok) {
                    showError(data.error || 'Error al cargar descargas');
                    return;
                }

                displayDownloads(data.descargas || []);
            } catch (error) {
                console.error('Error:', error);
            }
        }

        function displayDownloads(downloads) {
            if (downloads.length === 0) {
                downloadsList.innerHTML = '<div class="empty-state">No hay descargas. ¡Inicia una nueva!</div>';
                return;
            }

            downloadsList.innerHTML = downloads.map(download => `
                <div class="download-item">
                    <div class="download-item-header">
                        <div class="download-item-title">${download.title}</div>
                        <span class="status-badge status-${download.status}">${download.status.toUpperCase()}</span>
                    </div>

                    <div class="progress-bar">
                        <div class="progress-fill" style="width: ${download.progress}%"></div>
                    </div>

                    <div class="download-stats">
                        <div class="stat">
                            <div class="stat-label">Progreso</div>
                            <div>${download.progress.toFixed(1)}%</div>
                        </div>
                        <div class="stat">
                            <div class="stat-label">Velocidad</div>
                            <div>${formatBytes(download.speed)}/s</div>
                        </div>
                        <div class="stat">
                            <div class="stat-label">Descargado</div>
                            <div>${formatBytes(download.downloaded_bytes)} / ${formatBytes(download.total_bytes)}</div>
                        </div>
                        <div class="stat">
                            <div class="stat-label">Peers</div>
                            <div>${download.peers}</div>
                        </div>
                    </div>

                    <div class="download-actions">
                        ${download.status === 'descargando' ? 
                            `<button class="btn btn-pause" onclick="pauseDownload(${download.id})">Pausar</button>` :
                            ''
                        }
                        ${download.status === 'pausado' ? 
                            `<button class="btn btn-resume" onclick="resumeDownload(${download.id})">Reanudar</button>` :
                            ''
                        }
                        ${download.status === 'completado' ? 
                            `<button class="btn btn-resume" onclick="playTorrent(${download.id})">Reproducir</button>` :
                            ''
                        }
                        ${download.status === 'completado' ? 
                            `<button class="btn btn-primary" onclick="viewFiles(${download.id})">Ver Archivos</button>` :
                            ''
                        }
                        <button class="btn btn-danger" onclick="cancelDownload(${download.id})">Eliminar</button>
                    </div>
                </div>
            `).join('');
        }

        async function pauseDownload(id) {
            try {
                const response = await fetch(`${API_BASE}/torrents/${id}/pausar`, {
                    method: 'PUT',
                    headers: { 'x-auth-token': authToken }
                });

                const data = await response.json();
                if (response.ok) {
                    showSuccess('Descarga pausada');
                    loadDownloads();
                } else {
                    showError(data.error);
                }
            } catch (error) {
                showError('Error al pausar: ' + error.message);
            }
        }

        async function resumeDownload(id) {
            try {
                const response = await fetch(`${API_BASE}/torrents/${id}/reanudar`, {
                    method: 'PUT',
                    headers: { 'x-auth-token': authToken }
                });

                const data = await response.json();
                if (response.ok) {
                    showSuccess('Descarga reanudada');
                    loadDownloads();
                } else {
                    showError(data.error);
                }
            } catch (error) {
                showError('Error al reanudar: ' + error.message);
            }
        }

        async function cancelDownload(id) {
            if (!confirm('¿Estás seguro de que quieres eliminar esta descarga?')) return;

            try {
                const response = await fetch(`${API_BASE}/torrents/${id}`, {
                    method: 'DELETE',
                    headers: { 'x-auth-token': authToken }
                });

                const data = await response.json();
                if (response.ok) {
                    showSuccess('Descarga eliminada');
                    loadDownloads();
                } else {
                    showError(data.error);
                }
            } catch (error) {
                showError('Error al eliminar: ' + error.message);
            }
        }

        async function viewFiles(id) {
            try {
                const response = await fetch(`${API_BASE}/torrents/${id}/archivos`, {
                    headers: { 'x-auth-token': authToken }
                });

                const data = await response.json();
                if (response.ok) {
                    alert(`Archivos descargados:\n\n${data.archivos.map(f => f.name).join('\n')}`);
                } else {
                    showError(data.error);
                }
            } catch (error) {
                showError('Error al obtener archivos: ' + error.message);
            }
        }

        async function playTorrent(id) {
            try {
                const filesResponse = await fetch(`${API_BASE}/torrents/${id}/archivos`, {
                    headers: { 'x-auth-token': authToken }
                });

                const filesData = await filesResponse.json();
                if (!filesResponse.ok) {
                    showError(filesData.error || 'No se pudo obtener el archivo a reproducir');
                    return;
                }

                const files = Array.isArray(filesData.archivos) ? filesData.archivos : [];
                if (!files.length) {
                    showError('No hay archivos de video para reproducir');
                    return;
                }

                const selectedFile = files.reduce((largest, file) => (
                    Number(file.size || 0) > Number(largest.size || 0) ? file : largest
                ), files[0]);

                const streamUrl = `${API_BASE}/torrents/${id}/stream?file=${encodeURIComponent(selectedFile.name)}`;
                const streamResponse = await fetch(streamUrl, {
                    headers: { 'x-auth-token': authToken }
                });

                if (!streamResponse.ok) {
                    const errorData = await streamResponse.json();
                    showError(errorData.error || 'No se pudo reproducir el archivo');
                    return;
                }

                const mediaBlob = await streamResponse.blob();
                const mediaUrl = URL.createObjectURL(mediaBlob);
                window.open(mediaUrl, '_blank');
            } catch (error) {
                showError('Error al reproducir: ' + error.message);
            }
        }

        function formatBytes(bytes) {
            if (bytes === 0) return '0 B';
            const k = 1024;
            const sizes = ['B', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return (bytes / Math.pow(k, i)).toFixed(2) + ' ' + sizes[i];
        }

        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.style.display = 'block';
            setTimeout(() => {
                errorMessage.style.display = 'none';
            }, 5000);
        }

        function showSuccess(message) {
            successMessage.textContent = message;
            successMessage.style.display = 'block';
            setTimeout(() => {
                successMessage.style.display = 'none';
            }, 5000);
        }
    </script>
</body>
</html>
